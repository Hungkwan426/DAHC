<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dystar Backup Dashboard</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
}

/* ⏰ CLOCK (shifted slightly left) */
#clock {
    position: absolute;

    top: 30px;
    right: 95px;   /* ⬅ moved left from 50px to 80px */

    transform: translate(50%, -50%);

    background: #1e293b;
    padding: 8px 14px;
    border: 1px solid #334155;
    border-radius: 6px;

    font-size: 14px;
    font-weight: bold;
    color: #38bdf8;
    letter-spacing: 1px;

    width: 120px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 240px;
    background: #1e293b;
    color: #e2e8f0;
    border: 1px solid #334155;
    padding: 10px;
    box-sizing: border-box;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #22c55e;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #334155;
    padding: 8px;
}

th {
    background: #334155;
}

.ok { color: #22c55e; font-weight: bold; }
.progress { color: #38bdf8; font-weight: bold; }
.stale { color: #facc15; font-weight: bold; }
.missing { color: #ef4444; font-weight: bold; }

#summary {
    margin-top: 15px;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="clock">--:--:--</div>

<h2>Dystar Azure Backup Dashboard</h2>

<textarea id="logs" placeholder="Paste Azure backup jobs here..."></textarea>
<br>
<button onclick="processLogs()">Analyze</button>

<div id="summary"></div>

<table>
<thead>
<tr>
<th>Server</th>
<th>Status</th>
<th>Vault</th>
<th>Last Backup</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

const servers = [
"dy5bcdabcd40","dy5epdaepd40","dy5w2dawwd40","dy5d3dad3d40","dy5w1dawwd40",
"dy5ciard2200","dy5cieru2800","dy5cibwt2400","dy5ciscd2500","dy5ciarq2000",
"dy5cierq2000","dy5smdasmd40","dy5dbarp0200","dy5ciarp0200","dy5dberp0100",
"dy5cierp0100","dy5cibwp0400","dy5ciscp0500","dy5ftpdaprd01","dy5bcdabcp01",
"dy5w1dawwp01","dy5w2dawwp01","dy5epdaepp01","dy5dcr01","dy5d3dad3p01",
"dy5dcr02","dy5otdaotd40","dy5w1dawwp11","dy5w2dawwp11"
];

const STALE_HOURS = 24;

function processLogs() {
    const raw = document.getElementById("logs").value
        .split("\n")
        .map(l => l.trim())
        .filter(Boolean);

    let records = [];

    for (let i = 0; i < raw.length; i++) {
        if (raw[i] === "Scheduled Backup") {
            let block = raw.slice(i, i + 6);
            if (block.length < 6) continue;

            records.push({
                status: block[1],
                server: block[2].toLowerCase(),
                vault: block[3],
                date: block[4]
            });
        }
    }

    let map = {};
    records.forEach(r => {
        let t = new Date(r.date);
        if (!map[r.server] || new Date(map[r.server].date) < t) {
            map[r.server] = r;
        }
    });

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let now = new Date();
    let stats = { ok:0, progress:0, stale:0, missing:0 };

    servers.forEach(s => {
        let status = "NO BACKUP";
        let date = "-";
        let vault = "-";
        let cls = "missing";

        if (map[s]) {
            status = map[s].status;
            date = map[s].date;
            vault = map[s].vault;

            let diff = (now - new Date(date)) / (1000 * 60 * 60);

            if (status.toLowerCase().includes("progress")) {
                cls = "progress";
                stats.progress++;
            } else if (diff > STALE_HOURS) {
                cls = "stale";
                status = "STALE";
                stats.stale++;
            } else {
                cls = "ok";
                stats.ok++;
            }
        } else {
            stats.missing++;
        }

        tbody.innerHTML += `
        <tr>
            <td>${s}</td>
            <td class="${cls}">${status}</td>
            <td>${vault}</td>
            <td>${date}</td>
        </tr>`;
    });

    document.getElementById("summary").innerHTML = `
        ✅ OK: ${stats.ok} |
        🔄 In Progress: ${stats.progress} |
        ⚠️ Stale (> ${STALE_HOURS}h): ${stats.stale} |
        ❌ Missing: ${stats.missing}
    `;
}
</script>

</body>
</html>
